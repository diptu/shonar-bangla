<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_1 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_1" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_1');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0x404040, 2);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0x00F2FF, 2);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

// Bangladesh Low-Poly Silhouette (Simplified representation)
// In a real scenario, this would be a loaded GLTF, but here we construct a geometric abstraction
const mapGroup = new THREE.Group();

const material = new THREE.MeshPhongMaterial({
    color: 0x121A26,
    emissive: 0x00F2FF,
    emissiveIntensity: 0.2,
    flatShading: true,
    transparent: true,
    opacity: 0.9,
    wireframe: true
});

// Dhaka Highlight Point
const dhakaGeometry = new THREE.SphereGeometry(0.1, 16, 16);
const dhakaMaterial = new THREE.MeshBasicMaterial({ color: 0xFFD700 });
const dhakaPoint = new THREE.Mesh(dhakaGeometry, dhakaMaterial);
dhakaPoint.position.set(0, 0, 0.5);
mapGroup.add(dhakaPoint);

// Abstract Low-Poly Shape representing Bangladesh
const geometry = new THREE.IcosahedronGeometry(3, 1);
const mesh = new THREE.Mesh(geometry, material);
mapGroup.add(mesh);

scene.add(mapGroup);
camera.position.z = 8;

// Data Streams (Particles)
const particleCount = 100;
const particles = new THREE.BufferGeometry();
const posArray = new Float32Array(particleCount * 3);

for(let i=0; i < particleCount * 3; i++) {
    posArray[i] = (Math.random() - 0.5) * 10;
}

particles.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
const pMaterial = new THREE.PointsMaterial({
    size: 0.05,
    color: 0x00F2FF,
    transparent: true,
    opacity: 0.8
});
const particleMesh = new THREE.Points(particles, pMaterial);
scene.add(particleMesh);

function animate() {
    requestAnimationFrame(animate);
    mapGroup.rotation.y += 0.005;
    particleMesh.rotation.y -= 0.002;
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_1 -->
</body>
</html>
