<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_9 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_9" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_9');
  const devicePixelRatio = window.devicePixelRatio || 1;
  (function() {
  const container = document.getElementById('threejs-container-ANIMATION_1');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
  const height = container.clientHeight || window.innerHeight;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
  camera.position.z = 12;

  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(devicePixelRatio);
  container.appendChild(renderer.domElement);

  // Lighting
  const ambientLight = new THREE.AmbientLight(0x404040, 2);
  scene.add(ambientLight);
  
  const mainLight = new THREE.DirectionalLight(0x00F2FF, 1.5);
  mainLight.position.set(5, 5, 5);
  scene.add(mainLight);

  const globeGroup = new THREE.Group();
  scene.add(globeGroup);

  // The Globe (Atmosphere/Wireframe base)
  const globeGeometry = new THREE.SphereGeometry(5, 64, 64);
  const globeMaterial = new THREE.MeshPhongMaterial({
    color: 0x0a0e14,
    emissive: 0x00F2FF,
    emissiveIntensity: 0.1,
    transparent: true,
    opacity: 0.9,
    wireframe: true
  });
  const globe = new THREE.Mesh(globeGeometry, globeMaterial);
  globeGroup.add(globe);

  // Inner solid core
  const coreGeometry = new THREE.SphereGeometry(4.95, 64, 64);
  const coreMaterial = new THREE.MeshBasicMaterial({ color: 0x0a0e14 });
  const core = new THREE.Mesh(coreGeometry, coreMaterial);
  globeGroup.add(core);

  // Interactive Nodes
  const nodes = [
    { name: 'Dhaka Uplink', lat: 23.8103, lng: 90.4125, color: 0x00F2FF, status: 'Active' },
    { name: 'Global Hub A', lat: 40.7128, lng: -74.0060, color: 0xFFD700, status: 'Stable' },
    { name: 'Global Hub B', lat: 51.5074, lng: -0.1278, color: 0xFFD700, status: 'Stable' },
    { name: 'Global Hub C', lat: 35.6762, lng: 139.6503, color: 0xFFD700, status: 'Stable' }
  ];

  function latLngToVector3(lat, lng, radius) {
    const phi = (90 - lat) * (Math.PI / 180);
    const theta = (lng + 180) * (Math.PI / 180);
    return new THREE.Vector3(
      -radius * Math.sin(phi) * Math.cos(theta),
      radius * Math.cos(phi),
      radius * Math.sin(phi) * Math.sin(theta)
    );
  }

  const nodeMeshes = [];
  nodes.forEach(data => {
    const pos = latLngToVector3(data.lat, data.lng, 5.1);
    const nodeGeo = new THREE.SphereGeometry(0.12, 16, 16);
    const nodeMat = new THREE.MeshBasicMaterial({ color: data.color });
    const nodeMesh = new THREE.Mesh(nodeGeo, nodeMat);
    nodeMesh.position.copy(pos);
    nodeMesh.userData = data;
    globeGroup.add(nodeMesh);
    nodeMeshes.push(nodeMesh);

    // Glow for node
    const glowGeo = new THREE.SphereGeometry(0.25, 16, 16);
    const glowMat = new THREE.MeshBasicMaterial({ color: data.color, transparent: true, opacity: 0.3 });
    const glowMesh = new THREE.Mesh(glowGeo, glowMat);
    glowMesh.position.copy(pos);
    globeGroup.add(glowMesh);
  });

  // Data Arcs (Connections from Dhaka)
  const dhakaPos = latLngToVector3(23.8103, 90.4125, 5.1);
  nodeMeshes.slice(1).forEach(targetNode => {
    const targetPos = targetNode.position;
    const points = [];
    for (let i = 0; i <= 20; i++) {
      const p = new THREE.Vector3().lerpVectors(dhakaPos, targetPos, i / 20);
      p.normalize().multiplyScalar(5.1 + Math.sin(Math.PI * i / 20) * 0.8);
      points.push(p);
    }
    const curve = new THREE.CatmullRomCurve3(points);
    const arcGeo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(50));
    const arcMat = new THREE.LineBasicMaterial({ color: 0x00F2FF, transparent: true, opacity: 0.4 });
    const arc = new THREE.Line(arcGeo, arcMat);
    globeGroup.add(arc);
  });

  // Starfield
  const starCount = 1000;
  const starGeo = new THREE.BufferGeometry();
  const starPos = new Float32Array(starCount * 3);
  for(let i=0; i<starCount*3; i++) starPos[i] = (Math.random() - 0.5) * 100;
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.5 });
  scene.add(new THREE.Points(starGeo, starMat));

  // Interaction State
  let isDragging = false;
  let previousMouseX = 0;
  let previousMouseY = 0;
  let targetRotationX = 0;
  let targetRotationY = 0;
  let currentRotationX = 0;
  let currentRotationY = 0;
  let zoom = 12;

  // Raycasting for node hover
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  container.addEventListener('mousedown', (e) => {
    isDragging = true;
    previousMouseX = e.clientX;
    previousMouseY = e.clientY;
  });

  window.addEventListener('mouseup', () => {
    isDragging = false;
  });

  window.addEventListener('mousemove', (e) => {
    if (isDragging) {
      const deltaX = e.clientX - previousMouseX;
      const deltaY = e.clientY - previousMouseY;
      targetRotationY += deltaX * 0.005;
      targetRotationX += deltaY * 0.005;
      previousMouseX = e.clientX;
      previousMouseY = e.clientY;
    }

    // Raycasting
    const rect = container.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  });

  container.addEventListener('wheel', (e) => {
    e.preventDefault();
    zoom += e.deltaY * 0.01;
    zoom = Math.max(7, Math.min(20, zoom));
  }, { passive: false });

  function animate() {
    requestAnimationFrame(animate);
    
    // Smooth rotation
    currentRotationX += (targetRotationX - currentRotationX) * 0.1;
    currentRotationY += (targetRotationY - currentRotationY) * 0.1;
    globeGroup.rotation.x = currentRotationX;
    globeGroup.rotation.y = currentRotationY;

    // Ambient rotation
    if(!isDragging) targetRotationY += 0.001;

    // Camera zoom
    camera.position.z += (zoom - camera.position.z) * 0.1;

    // Hover detection
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(nodeMeshes);
    
    nodeMeshes.forEach(m => m.scale.set(1,1,1));
    if (intersects.length > 0) {
      intersects[0].object.scale.set(2, 2, 2);
      document.body.style.cursor = 'pointer';
    } else {
      document.body.style.cursor = 'default';
    }

    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });

  animate();
})();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_9 -->
</body>
</html>
