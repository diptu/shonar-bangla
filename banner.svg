<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Consolas, monospace">
  <defs>
    <linearGradient id="fieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00753A"/>
      <stop offset="100%" stop-color="#006A4E"/>
    </linearGradient>
    <radialGradient id="discGrad" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#FF3A2F"/>
      <stop offset="100%" stop-color="#F42A1D"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Green field with rounded corners -->
  <rect x="0" y="0" width="900" height="320" rx="18" fill="url(#fieldGrad)"/>

  <!-- subtle border -->
  <rect x="2" y="2" width="896" height="316" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"/>

  <!-- Red disc, offset slightly left of center per the real flag proportions -->
  <circle cx="330" cy="160" r="118" fill="url(#discGrad)" filter="url(#softShadow)"/>

  <!-- ASCII-style corner accents -->
  <text x="30" y="40" fill="#FFFFFF" fill-opacity="0.35" font-size="16">┌──────</text>
  <text x="770" y="40" fill="#FFFFFF" fill-opacity="0.35" font-size="16">──────┐</text>
  <text x="30" y="292" fill="#FFFFFF" fill-opacity="0.35" font-size="16">└──────</text>
  <text x="770" y="292" fill="#FFFFFF" fill-opacity="0.35" font-size="16">──────┘</text>

  <!-- ASCII wordmark -->
  <g font-size="30" font-weight="bold" letter-spacing="2">
    <text x="450" y="150" text-anchor="middle" fill="#FFFFFF">█▀ █░█ █▀█ █▄░█ ▄▀█ █▀█</text>
    <text x="450" y="188" text-anchor="middle" fill="#FFFFFF">▄█ █▀█ █▄█ █░▀█ █▀█ █▀▄</text>
  </g>

  <text x="450" y="230" text-anchor="middle" fill="#FFFFFF" font-size="24" font-weight="bold" letter-spacing="6">B A N G L A</text>

  <!-- tagline -->
  <text x="450" y="268" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.85" font-size="15" font-style="italic" font-family="Georgia, serif">Visualize the trajectory of a nation.</text>

  <!-- flag emoji marker -->
  <text x="450" y="298" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.6" font-size="13" letter-spacing="1">::  OPEN-SOURCE NATIONAL DASHBOARD  ::</text>
</svg>
